<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.9">
    <title>Analyseur de Données - NANORESEAU</title>
    <link rel="stylesheet" href="./technicalDashboardLite.css">
    <link rel="stylesheet" href="./commercialDashboardLite.css">
    <link rel="stylesheet" href="./arduinoLite.css">
    <script src="../../chart.js"></script>
    <script type="module" src="arduinoMain.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; width: 100%;">
                <button id="backButton" class="back-button" style="margin-right: auto;">⬅️ Retour</button>
                <h1 style="margin: 0; flex-grow: 1; text-align: center;">📊 Analyseur de Données NANORESEAU</h1>
                <div style="width: 100px;"></div> 
            </div>
            <p style="margin-top: 15px;">Importez votre fichier txt pour extraire et visualiser les données multiples</p>
        </div>
        
        <div class="content">
            <!-- SECTION UPLOAD -->
            <div class="upload-section" id="uploadSection">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" accept=".txt">
                    <label for="fileInput" class="file-label">📁 Choisir un fichier</label>
                </div>
                <div class="file-name" id="fileName">Aucun fichier sélectionné</div>
            </div>
            
            <!-- LOADER -->
            <div class="loader-container" id="loaderContainer">
                <div class="spinner"></div>
                <div class="loader-text" id="loaderText">Analyse du fichier en cours...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <!-- MESSAGES D'ERREUR -->
            <div class="error-message" id="errorMessage"></div>
            
            <!-- SECTION INFO (NANORESEAU) -->
            <div class="info-section" id="infoSection">
                <h3>🔍 Informations extraites</h3>
                <div>NANORESEAU N°:</div>
                <div class="nanoreseau-value" id="nanoreseauValue">-</div>
                
                <!-- ONGLETS PRINCIPAUX -->
                <div class="tabs">
                    <div class="tab active" data-tab="Technique">Technique</div>
                    <div class="tab" data-tab="Commercial">Commercial</div>
                </div>
                
                <!-- CONTENEURS DES DASHBOARDS -->
                <div id="technicalDashboard"></div>
                <div id="commercialDashboard"></div>        
                <div class="type-legend" id="typeLegend"></div>
            </div>

            <button class="toggle-tables-btn" onclick="toggleTablesContainer()" style="margin: 15px 0; padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;"></button>

            <!-- TABLEAUX DÉTAILLÉS -->
            <div class="tables-container" id="tablesContainer"></div>
        </div>
    </div>
</body>
</html>
