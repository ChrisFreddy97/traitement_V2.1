<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.9">
    <title>Analyse - NANORESEAU</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./commercialDashboardLite.css">
    <link rel="stylesheet" href="./technicalDashboardLite.css">
    <link rel="stylesheet" href="./arduinoLite.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #88aae1 0%, #88aae1 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .analyze-header {
            background: linear-gradient(135deg, #0e1a81 0%, #490783 100%);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-info h1 {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .header-info p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-top: 5px;
        }

        .version-badge {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #1e293b;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            border: 2px solid white;
            white-space: nowrap;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(-3px);
        }

        .analyze-main {
            background: transparent;
        }

        /* Onglets */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }

        .tab {
            padding: 10px 24px;
            font-weight: 600;
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 30px;
        }

        .tab:hover {
            color: #f59e0b;
            background: #fef3c7;
        }

        .tab.active {
            color: white;
            background: linear-gradient(135deg, #0e1a81 0%, #490783 100%);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
        }

        /* Loader */
        .loader-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 15px 20px;
            border-radius: 12px;
            color: #991b1b;
            margin-bottom: 20px;
        }

        /* Bouton toggle tables */
        .toggle-tables-btn {
            background: linear-gradient(135deg, #0e1a81 0%, #490783 100%) !important;
            color: white !important;
            border: none !important;
            padding: 12px 24px !important;
            border-radius: 40px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            transition: all 0.3s ease !important;
            font-size: 13px !important;
            margin: 15px 0 !important;
        }

        .toggle-tables-btn:hover {
            transform: translateY(-2px);
        }

        #tablesContainer {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
            overflow-x: auto;
        }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .analyze-header { padding: 15px 20px; }
            .header-content { flex-direction: column; text-align: center; }
            .tab { padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="analyze-header">
            <div class="header-content">
                <div class="header-info">
                    <h1 id="page-title">📂 Analyse du Fichier</h1>
                    <p id="file-info-subtitle" style="margin-top: 5px;"></p>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button id="back-btn" class="btn-secondary">← Retour</button>
                    <div class="version-badge">⚡ ANALYSE V1 ⚡</div>
                </div>
            </div>
        </header>

        <main class="analyze-main">
            <div id="analysis-content">
                <div class="loader-container">
                    <div class="spinner"></div>
                    <div>Chargement des données...</div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { analyzeFromContent } from './arduinoMain.js';
        import { renderByTab } from './arduinoRender.js';

        // Récupérer les données du localStorage
        const storedData = localStorage.getItem('currentAnalysisData');
        
        if (!storedData) {
            document.getElementById('analysis-content').innerHTML = `
                <div class="error-message">
                    ❌ Aucune donnée à analyser. Veuillez d'abord uploader un fichier.
                </div>
                <button id="go-back-btn" class="btn-secondary" style="margin-top: 20px;">← Retour à l'upload</button>
            `;
            document.getElementById('go-back-btn')?.addEventListener('click', () => {
                window.location.href = 'arduino.html';
            });
        } else {
            try {
                const data = JSON.parse(storedData);
                document.getElementById('file-info-subtitle').textContent = `${data.fileName} | N°NR: ${data.nr}`;
                document.getElementById('page-title').innerHTML = `📂 Analyse - ${data.nr}`;
                
                // Créer la structure de la page (onglets + dashboards)
                document.getElementById('analysis-content').innerHTML = `
                    <!-- Section INFO -->
                    <div class="info-section" id="infoSection">
                        <!-- ONGLETS PRINCIPAUX -->
                        <div class="tabs">
                            <div class="tab active" data-tab="Technique">Technique</div>
                            <div class="tab" data-tab="Commercial">Commercial</div>
                        </div>
                        
                        <!-- CONTENEURS DES DASHBOARDS -->
                        <div id="technicalDashboard"></div>
                        <div id="commercialDashboard"></div>                    
                        <div class="type-legend" id="typeLegend"></div>
                    </div>

                    <button class="toggle-tables-btn" onclick="window.toggleTablesContainer()">
                        📋 Afficher les tableaux détaillés
                    </button>

                    <div id="tablesContainer" style="display: none;"></div>
                `;
                
                // Ajouter les gestionnaires d'onglets
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        renderByTab();
                        
                        // Scroll vers le début des dashboards
                        document.getElementById('infoSection').scrollIntoView({ 
                            behavior: 'smooth', 
                            block: 'start' 
                        });
                    });
                });
                
                // Appeler la fonction d'analyse
                await analyzeFromContent(data.content, data.nr);
                
                // Nettoyer le localStorage après succès
                localStorage.removeItem('currentAnalysisData');
                
                // Afficher le dashboard par défaut
                renderByTab();
                
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('analysis-content').innerHTML = `
                    <div class="error-message">
                        ❌ Erreur lors de l'analyse du fichier: ${error.message}
                    </div>
                    <button id="go-back-btn" class="btn-secondary" style="margin-top: 20px;">← Retour à l'upload</button>
                `;
                document.getElementById('go-back-btn')?.addEventListener('click', () => {
                    window.location.href = 'arduino.html';
                });
            }
        }
        
        // Bouton retour
        document.getElementById('back-btn')?.addEventListener('click', () => {
            window.location.href = 'arduino.html';
        });
    </script>
</body>
</html>
