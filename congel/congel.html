<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Relevés Congélateur</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .card {
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .table-container {
            max-height: 500px;
            overflow-y: auto;
        }
        .table-fixed th {
            position: sticky;
            top: 0;
            background-color: #f8fafc;
            z-index: 10;
        }
        /* Styles pour le modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.open {
            display: flex;
        }
        .modal-content {
            background-color: white;
            border-radius: 12px;
            width: 95%;
            max-width: 1200px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalAppear 0.3s ease-out;
        }
        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            padding: 1.5rem;
            max-height: 60vh;
            overflow-y: auto;
        }
        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6b7280;
            padding: 0.25rem;
            border-radius: 4px;
        }
        .close-btn:hover {
            background-color: #f3f4f6;
            color: #374151;
        }
        /* Styles pour les onglets d'analyse */
        .analysis-tabs {
            border-bottom: 1px solid #e5e7eb;
            margin-bottom: 1rem;
        }
        .analysis-tab {
            padding: 0.75rem 1.5rem;
            border: none;
            background: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .analysis-tab.active {
            border-bottom-color: #3b82f6;
            color: #3b82f6;
            font-weight: 600;
        }
        .analysis-tab:hover {
            background-color: #f8fafc;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .cursor-pointer {
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow-sm p-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-800 mb-2">
                    Gestion Relevés Congélateur
                </h1>
                <p id="user-id-display" class="text-sm text-gray-600 font-mono"></p>
            </div>
            <div>
                <button onclick="window.location.href = '../home.html'" class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors shadow-md mr-4">
                    Retour à l'accueil
                </button>
            </div>
        </div>
    </header>

    <!-- Contenu principal -->
    <main class="p-6">
        <div class="max-w-7xl mx-auto">
            
            <!-- Section d'ajout de relevé -->
            <div class="bg-white rounded-2xl shadow-xl p-6 mb-8 card">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Ajouter un nouveau relevé</h2>
                
                <form id="upload-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Numéro NR -->
                        <div>
                            <label for="nr-number" class="block text-sm font-medium text-gray-700 mb-2">Numéro NR</label>
                            <input 
                                type="text" 
                                id="nr-number" 
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                                placeholder="Ex: NR12345"
                                required
                            >
                        </div>
                        
                        <!-- Type de forfait -->
                        <div>
                            <label for="forfait-type" class="block text-sm font-medium text-gray-700 mb-2">Type de forfait</label>
                            <select 
                                id="forfait-type" 
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                                required
                            >
                                <option value="">Sélectionnez un type</option>
                                <option value="Congel -10°C (Freezer 3)">Congel -10°C (Freezer 3)</option>
                                <option value="Congel -5°C (Freezer 4)">Congel -5°C (Freezer 4)</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Fichier de relevé -->
                    <div>
                        <label for="releve-file" class="block text-sm font-medium text-gray-700 mb-2">Fichier de relevé (.txt)</label>
                        <div class="flex items-center">
                            <input 
                                type="file" 
                                id="releve-file" 
                                accept=".txt"
                                class="hidden"
                                required
                            >
                            <label for="releve-file" class="flex-1 px-4 py-2 border border-gray-300 rounded-l-lg bg-white cursor-pointer hover:bg-gray-50 transition-colors">
                                <span id="file-name">Sélectionner un fichier</span>
                            </label>
                            <button type="button" id="browse-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-r-lg hover:bg-gray-300 transition-colors">
                                Parcourir
                            </button>
                        </div>
                        <p class="text-xs text-gray-500 mt-2">Seuls les fichiers .txt sont acceptés</p>
                    </div>
                    
                    <!-- Bouton de soumission -->
                    <div class="flex justify-end">
                        <button 
                            type="submit" 
                            class="px-6 py-3 bg-green-500 text-white font-semibold rounded-lg hover:bg-green-600 transition-colors shadow-md flex items-center"
                        >
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                            </svg>
                            Ajouter le relevé
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Liste des relevés -->
            <div class="bg-white rounded-2xl shadow-xl p-6 card">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Relevés existants</h2>
                    <div class="flex space-x-4">
                        <input 
                            type="text" 
                            id="search-input" 
                            placeholder="Rechercher par NR..." 
                            class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                        >
                        <button id="clear-search" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors">
                            Effacer
                        </button>
                    </div>
                </div>
                
                <div class="table-container">
                    <table class="min-w-full divide-y divide-gray-200 table-fixed">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/6">NR</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/6">Type de forfait</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/6">Date d'ajout</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/6">Statut</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/6">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="releves-list" class="bg-white divide-y divide-gray-200">
                            <!-- Les relevés seront ajoutés dynamiquement ici -->
                        </tbody>
                    </table>
                </div>
                
                <div id="no-releves-message" class="text-center py-8 text-gray-500 hidden">
                    Aucun relevé n'a été ajouté pour le moment.
                </div>
            </div>
        </div>
    </main>

    <!-- Modal pour les détails du relevé -->
    <div id="details-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" class="text-xl font-bold text-gray-800">Détails du relevé</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modal-content">
                    <!-- Le contenu du modal sera injecté ici dynamiquement -->
                </div>
            </div>
            <div class="modal-footer">
                <button id="download-btn" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
                    Télécharger le fichier
                </button>
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors">
                    Fermer
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-6 mt-8">
        <div class="max-w-7xl mx-auto px-6 text-center text-gray-600">
            <p>&copy; 2025 Plateforme de Gestion V2. Tous droits réservés.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="congel.js"></script>
</body>
</html>
